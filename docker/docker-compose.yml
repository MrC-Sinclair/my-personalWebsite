services:
  postgres:
    image: postgres:17
    container_name: personal_website_db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: personal_website
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
